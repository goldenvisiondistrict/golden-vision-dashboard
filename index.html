<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Golden Vision — Today's Availability</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111;
      color: #e8e0d0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
    }
    header {
      background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
      border-bottom: 2px solid #c9a84c;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo-icon {
      width: 40px;
      height: 40px;
      background: #c9a84c;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #c9a84c;
      letter-spacing: 0.05em;
    }
    .subtitle {
      font-size: 0.75rem;
      color: #888;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .header-right {
      text-align: right;
    }
    .date-label {
      font-size: 0.85rem;
      color: #c9a84c;
      font-weight: 600;
    }
    .update-info {
      font-size: 0.72rem;
      color: #666;
      margin-top: 3px;
    }
    .refresh-btn {
      background: #c9a84c;
      color: #111;
      border: none;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.2s;
    }
    .refresh-btn:hover { background: #e0c060; }
    .refresh-btn:disabled { background: #555; color: #888; cursor: not-allowed; }
    .main {
      padding: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 16px;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: #c9a84c44; }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .barber-name {
      font-size: 1.05rem;
      font-weight: 700;
      color: #f0e8d8;
    }
    .badge {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .badge-available { background: #1a3a1a; color: #4caf50; border: 1px solid #4caf5040; }
    .badge-full { background: #3a1a1a; color: #e57373; border: 1px solid #e5737340; }
    .badge-offline { background: #2a2a1a; color: #ffd740; border: 1px solid #ffd74040; }
    .badge-error { background: #2a1a2a; color: #ce93d8; border: 1px solid #ce93d840; }
    .slots-container {
      min-height: 60px;
    }
    .slots-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .slot-chip {
      background: #222;
      border: 1px solid #333;
      color: #c9a84c;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 0.78rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .no-slots-msg {
      color: #555;
      font-size: 0.82rem;
      font-style: italic;
    }
    .booksy-link {
      display: block;
      margin-top: 12px;
      text-align: center;
      color: #c9a84c;
      font-size: 0.75rem;
      text-decoration: none;
      opacity: 0.6;
      transition: opacity 0.2s;
    }
    .booksy-link:hover { opacity: 1; }
    .slot-count {
      font-size: 0.78rem;
      color: #666;
      margin-bottom: 8px;
    }
    .loading-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
    }
    .loading-overlay.active { display: flex; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #333;
      border-top-color: #c9a84c;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: #c9a84c; font-size: 0.9rem; }
    .countdown {
      font-size: 0.7rem;
      color: #555;
      margin-top: 4px;
    }
    .summary-bar {
      display: flex;
      gap: 20px;
      background: #161616;
      border: 1px solid #222;
      border-radius: 10px;
      padding: 12px 20px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .stat {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .stat-num {
      font-size: 1.4rem;
      font-weight: 800;
      color: #c9a84c;
    }
    .stat-label {
      font-size: 0.72rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text">Fetching latest availability…</div>
</div>

<header>
  <div class="logo-wrap">
    <div class="logo-icon">✂️</div>
    <div>
      <h1>Golden Vision</h1>
      <div class="subtitle">Barber Shop · Live Availability</div>
    </div>
  </div>
  <div class="header-right">
    <div class="date-label" id="dateLabel"></div>
    <div class="update-info" id="updateInfo">Updated at 5:08 am</div>
    <div class="countdown" id="countdown"></div>
    <button class="refresh-btn" id="refreshBtn" onclick="manualRefresh()">↻ Refresh Now</button>
  </div>
</header>

<div class="main">
  <div class="summary-bar" id="summaryBar"></div>
  <div class="grid" id="grid"></div>
</div>

<script>
const BARBER_DATA = [{"name": "Tapia", "status": "available", "slots": ["1:00 PM", "1:15 PM", "1:30 PM", "1:45 PM", "2:00 PM", "4:00 PM", "4:15 PM", "4:30 PM", "4:45 PM", "5:00 PM", "5:15 PM", "5:30 PM", "5:45 PM", "6:00 PM", "6:15 PM", "6:30 PM", "6:45 PM", "7:00 PM"], "url": "https://booksy.com/en-us/1676613_tapiacuts_barber-shop_103795_tustin"}, {"name": "LVL UP", "status": "available", "slots": ["2:15 PM"], "url": "https://booksy.com/en-us/471471_lvl-up-barbering_barber-shop_103795_tustin"}, {"name": "Rey", "status": "available", "slots": ["9:45 AM", "2:15 PM", "3:00 PM", "3:30 PM", "6:45 PM"], "url": "https://booksy.com/en-us/550303_reyyyblends_barber-shop_103795_tustin"}, {"name": "Parcerito", "status": "available", "slots": ["10:00 AM", "10:15 AM", "10:30 AM", "10:45 AM", "11:00 AM", "11:15 AM", "11:30 AM", "11:45 AM", "12:00 PM", "12:15 PM", "12:30 PM", "12:45 PM", "1:00 PM", "1:15 PM", "1:30 PM", "1:45 PM", "2:00 PM", "2:15 PM", "2:30 PM", "2:45 PM", "3:00 PM", "3:15 PM", "3:30 PM", "3:45 PM", "4:00 PM", "4:15 PM", "4:30 PM", "4:45 PM", "5:00 PM", "5:15 PM", "5:30 PM", "5:45 PM", "6:00 PM", "6:15 PM", "6:30 PM", "6:45 PM"], "url": "https://booksy.com/en-us/1060569_parceritoblendz_barber-shop_103795_tustin"}, {"name": "Melvin", "status": "available", "slots": ["1:15 PM", "1:30 PM", "1:45 PM", "2:00 PM", "2:15 PM", "2:30 PM", "2:45 PM", "3:00 PM", "3:15 PM", "5:30 PM", "5:45 PM", "6:00 PM", "6:15 PM"], "url": "https://booksy.com/en-us/1093394_melvinblendss_barber-shop_103795_tustin"}, {"name": "Allen", "status": "available", "slots": ["8:00 AM", "8:30 AM", "10:30 AM", "10:45 AM", "11:00 AM", "11:15 AM", "11:30 AM", "11:45 AM", "12:00 PM", "12:15 PM", "12:30 PM", "12:45 PM", "1:00 PM", "1:15 PM", "1:30 PM", "1:45 PM", "2:00 PM", "2:15 PM", "2:30 PM", "2:45 PM", "3:00 PM"], "url": "https://booksy.com/en-us/477377_allenblendz_barber-shop_103795_tustin"}, {"name": "Kevin", "status": "available", "slots": ["10:45 AM", "11:00 AM", "11:15 AM", "11:30 AM", "11:45 AM", "12:00 PM", "12:15 PM", "12:30 PM", "12:45 PM", "1:00 PM", "1:15 PM", "1:30 PM", "1:45 PM", "2:00 PM", "2:15 PM", "3:45 PM"], "url": "https://booksy.com/en-us/1459991_kevinblendz_barber-shop_103795_tustin"}, {"name": "Ailton", "status": "available", "slots": ["11:30 AM", "11:45 AM", "12:00 PM", "12:15 PM", "12:30 PM", "12:45 PM", "1:00 PM", "1:15 PM", "1:30 PM", "1:45 PM", "2:00 PM", "2:15 PM", "2:30 PM", "2:45 PM", "3:00 PM", "3:15 PM", "3:30 PM", "3:45 PM", "4:00 PM", "4:15 PM", "4:30 PM", "4:45 PM", "5:00 PM", "5:15 PM", "5:30 PM"], "url": "https://booksy.com/en-us/1464932_ailton-barberr_barber-shop_103795_tustin"}, {"name": "Azul", "status": "available", "slots": ["2:00 PM", "2:15 PM", "2:30 PM", "2:45 PM", "3:00 PM", "3:15 PM", "3:30 PM", "3:45 PM", "4:00 PM", "4:15 PM", "4:30 PM", "4:45 PM", "5:00 PM", "5:15 PM", "5:30 PM", "5:45 PM", "6:00 PM"], "url": "https://booksy.com/en-us/785012_juan-sebastian_barber-shop_103795_tustin"}, {"name": "George", "status": "no_online_booking", "slots": [], "url": "https://booksy.com/en-us/1631429_george-the-barber_barber-shop_103795_tustin"}, {"name": "Chris", "status": "fully_booked", "slots": [], "url": "https://booksy.com/en-us/438960_chris-the-barber_barber-shop_103795_tustin"}, {"name": "Maritza", "status": "fully_booked", "slots": [], "url": "https://booksy.com/en-us/787590_maritza_barber-shop_103795_tustin"}, {"name": "Antonio", "status": "fully_booked", "slots": [], "url": "https://booksy.com/en-us/1744293_bladezbyanton_barber-shop_103795_tustin"}];
const FETCHED_AT = "5:08 am";
const TODAY_STR = "Wednesday, April 22, 2026";

let nextRefresh = Date.now() + 10 * 60 * 1000;

function to12h(t) {
  return t; // already in 12h format from Python
}

function renderCards(data) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  let totalSlots = 0, activeBarbers = 0, fullBarbers = 0, offlineBarbers = 0;

  data.forEach(b => {
    const card = document.createElement('div');
    card.className = 'card';

    let badgeClass, badgeText, slotsHtml;

    if (b.status === 'no_online_booking') {
      badgeClass = 'badge-offline';
      badgeText = 'No Online Booking';
      slotsHtml = '<div class="no-slots-msg">Walk-ins only or call to schedule</div>';
      offlineBarbers++;
    } else if (b.status === 'error') {
      badgeClass = 'badge-error';
      badgeText = 'Unavailable';
      slotsHtml = '<div class="no-slots-msg">Could not fetch availability</div>';
      offlineBarbers++;
    } else if (b.slots.length === 0) {
      badgeClass = 'badge-full';
      badgeText = 'Fully Booked';
      slotsHtml = '<div class="no-slots-msg">No open slots today</div>';
      fullBarbers++;
    } else {
      badgeClass = 'badge-available';
      badgeText = `${b.slots.length} Open`;
      const chips = b.slots.map(t => `<div class="slot-chip">${t}</div>`).join('');
      slotsHtml = `<div class="slots-grid">${chips}</div>`;
      totalSlots += b.slots.length;
      activeBarbers++;
    }

    card.innerHTML = `
      <div class="card-header">
        <div class="barber-name">${b.name}</div>
        <div class="badge ${badgeClass}">${badgeText}</div>
      </div>
      <div class="slots-container">${slotsHtml}</div>
      <a href="${b.url}" class="booksy-link" target="_blank">→ Booksy Profile</a>
    `;
    grid.appendChild(card);
  });

  // Summary bar
  document.getElementById('summaryBar').innerHTML = `
    <div class="stat">
      <div class="stat-num">${activeBarbers}</div>
      <div class="stat-label">Barbers<br>With Openings</div>
    </div>
    <div class="stat">
      <div class="stat-num">${totalSlots}</div>
      <div class="stat-label">Total Open<br>Slots Today</div>
    </div>
    <div class="stat">
      <div class="stat-num">${fullBarbers}</div>
      <div class="stat-label">Fully<br>Booked</div>
    </div>
    <div class="stat">
      <div class="stat-num">${offlineBarbers}</div>
      <div class="stat-label">No Online<br>Booking</div>
    </div>
  `;
}

function updateCountdown() {
  const remaining = Math.max(0, Math.round((nextRefresh - Date.now()) / 1000));
  const mins = Math.floor(remaining / 60);
  const secs = remaining % 60;
  document.getElementById('countdown').textContent =
    `Auto-refreshes in ${mins}:${secs.toString().padStart(2, '0')}`;

  if (remaining === 0) {
    window.location.reload();
  }
}

function manualRefresh() {
  window.location.reload();
}

// Initialize
document.getElementById('dateLabel').textContent = TODAY_STR;
renderCards(BARBER_DATA);
setInterval(updateCountdown, 1000);
updateCountdown();
</script>
</body>
</html>
